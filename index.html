
<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG OUTFIT - Premium Fashion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50">

  <div class="bg-black text-white text-center py-2 text-sm">
    সারা বাংলাদেশে হোম ডেলিভারি | COD Available
  </div>

  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="text-3xl font-bold">OG OUTFIT</div>
      <a href="https://wa.me/8801312281209" target="_blank" 
         class="bg-green-500 text-white px-6 py-3 rounded-full flex items-center gap-2">
        <i class="fab fa-whatsapp"></i> Order Now
      </a>
    </div>
  </header>

  <section class="bg-gradient-to-r from-black to-gray-900 text-white py-28 text-center">
    <h1 class="text-6xl font-bold">Style That Defines You</h1>
  </section>

  <section id="shop" class="py-20">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-4xl font-bold mb-10">Our Products</h2>
      <div id="products-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </div>
  </section>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white max-w-3xl w-full rounded-3xl overflow-hidden">
      <div id="modal-content" class="p-8"></div>
    </div>
  </div>

  <script>
    let products = [ {
    id: 1,
    name: "Black Oversized T-Shirt",
    price: "200000000",
    images: ["https://example.com/black-tshirt1.jpg", "https://example.com/black-tshirt2.jpg"],
    sizes: ["S", "M", "L", "XL"],
    description: "Premium quality soft cotton oversized t-shirt. Very comfortable for daily wear."
  },
      // === এখান থেকে নতুন প্রোডাক্ট যোগ করবেন ===
    ];

    function renderProducts() {
      const container = document.getElementById('products-container');
      container.innerHTML = '';

      if (products.length === 0) {
        container.innerHTML = `<p class="col-span-full text-center py-20 text-gray-500">No products added yet. Add below.</p>`;
        return;
      }

      products.forEach(product => {
        const card = document.createElement('div');
        card.className = "bg-white rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl cursor-pointer";
        card.innerHTML = `
          <img src="${product.images[0]}" class="w-full h-64 object-cover">
          <div class="p-6">
            <h3 class="font-semibold text-lg">${product.name}</h3>
            <p class="text-2xl font-bold mt-2">৳ ${product.price}</p>
            <button onclick="viewProduct(${product.id}); event.stopImmediatePropagation()" 
              class="mt-5 w-full bg-black text-white py-4 rounded-2xl">View Details</button>
          </div>
        `;
        card.onclick = () => viewProduct(product.id);
        container.appendChild(card);
      });
    }

    function viewProduct(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      const sizesHTML = product.sizes ? 
        `<p class="mt-4"><strong>Available Sizes:</strong> ${product.sizes.join(', ')}</p>` : '';

      let imagesHTML = product.images.map(img => 
        `<img src="${img}" class="w-full h-80 object-cover rounded-2xl mb-4">`
      ).join('');

      document.getElementById('modal-content').innerHTML = `
        <button onclick="closeModal()" class="float-right text-4xl">×</button>
        ${imagesHTML}
        <h2 class="text-3xl font-bold">${product.name}</h2>
        <p class="text-4xl font-bold mt-3">৳ ${product.price}</p>
        ${sizesHTML}
        <p class="mt-6 text-gray-600">${product.description}</p>
        <button onclick="orderOnWhatsApp('${product.name}')" 
          class="mt-8 w-full bg-green-500 hover:bg-green-600 text-white py-5 rounded-2xl text-xl font-semibold">
          Order via WhatsApp
        </button>
      `;
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function orderOnWhatsApp(name) {
      const text = `Hello, I want to buy: ${name}`;
      window.open(`https://wa.me/8801312281209?text=${encodeURIComponent(text)}`, '_blank');
      closeModal();
    }

    // Initial render
    renderProducts();
  </script>
</body>
</html>
